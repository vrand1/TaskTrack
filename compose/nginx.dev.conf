events {}

# Вообще сейчас смысла нет для отдельного конфига в dev окружении
# Сделал больше для изоляции прода и дева, в дальнейшем может возникнуть необходимость
# Типа прокидывать запросы в prod SSO и Test SSO, чтобы дев не получал админку
# Там, где не пологатеся, и процесс разработки не вставал. 

http {

    map $http_upgrade $connection_upgrade {

        default upgrade;

        ''      close;

    }



    limit_req_zone $binary_remote_addr zone=auth_token_limit:10m rate=10r/m;

    limit_req_status 429;



    upstream task_api {

        server api:8000;

    }



    server {

        listen 80;

        server_name _;



        error_page 429 = @rate_limited;



        location @rate_limited {

            default_type application/json;

            return 429 '{"error":{"code":"RATE_LIMIT_EXCEEDED","message":"Слишком много запросов. Повторите позже."}}';

        }



        location = /api/v1/auth/token {

            limit_req zone=auth_token_limit burst=5 nodelay;



            proxy_pass http://task_api;

            proxy_http_version 1.1;

            proxy_set_header Host $host;

            proxy_set_header X-Real-IP $remote_addr;

            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header X-Request-ID $request_id;

        }



        location / {

            proxy_pass http://task_api;

            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;

            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;

            proxy_set_header X-Real-IP $remote_addr;

            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header X-Request-ID $request_id;

            proxy_read_timeout 3600s;

        }

    }

}

