name: task-service

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: task-nginx-dev
    ports:
      - "80:80"
    volumes:
      - ./nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile.dev
      args:
        UV_INDEX_URL: ${UV_INDEX_URL:-https://pypi.org/simple}
    container_name: task-api-dev
    ports:
      - "${GRPC_PORT:-50051}:50051"
    env_file:
      - .env
    environment:
      APP_DEBUG: "true"
      WATCHFILES_FORCE_POLLING: "true"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ../backend/app:/app/app
      - ../backend/alembic:/app/alembic
      - ../backend/alembic.ini:/app/alembic.ini
      - ../backend/tests:/app/tests
      - ../backend/pyproject.toml:/app/pyproject.toml
      - ../backend/uv.lock:/app/uv.lock
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"

  postgres:
    image: postgres:16-alpine
    container_name: task-postgres-dev
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: task-redis-dev
    env_file:
      - .env
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data_dev:
  redis_data_dev:
